<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | NEON MARKET</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#0a0a2a,#1a0033);color:#fff;padding:15px}
        .container{max-width:1200px;margin:0 auto}
        .header{background:rgba(191,64,255,0.2);padding:12px;border-radius:10px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
        .header h1{color:#bf40ff;font-size:18px}
        .logout-btn{background:#ff4040;color:white;border:none;padding:6px 15px;border-radius:20px;cursor:pointer}
        .section{background:rgba(255,255,255,0.1);border-radius:10px;padding:15px;margin-bottom:15px}
        .section h2{color:#bf40ff;font-size:16px;margin-bottom:10px;border-bottom:1px solid #bf40ff;padding-bottom:5px}
        input,button{padding:8px;margin:4px;border-radius:5px;border:none;width:calc(100% - 8px)}
        button{background:#bf40ff;color:white;cursor:pointer}
        table{width:100%;border-collapse:collapse;font-size:12px}
        th,td{padding:8px;text-align:left;border-bottom:1px solid rgba(191,64,255,0.3)}
        th{color:#bf40ff}
        .product-img{width:40px;height:40px;object-fit:cover;border-radius:5px}
        .form-group{margin-bottom:8px}
        .form-group label{display:block;margin-bottom:3px;color:#bf40ff}
        .edit-btn,.delete-btn{padding:4px 8px;margin:2px;border:none;border-radius:4px;cursor:pointer}
        .edit-btn{background:#ffa500;color:white}
        .delete-btn{background:#ff4040;color:white}
        .stats{display:flex;gap:10px;margin-bottom:15px}
        .stat-card{background:rgba(191,64,255,0.2);padding:10px;border-radius:8px;text-align:center;flex:1}
        .stat-number{font-size:24px;font-weight:bold;color:#bf40ff}
        .loading{text-align:center;padding:20px;color:#bf40ff}
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>👑 Admin Panel</h1><button class="logout-btn" onclick="logout()">Chiqish</button></div>
    <div class="stats"><div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>Mahsulotlar</div></div><div class="stat-card"><div class="stat-number" id="totalSum">0</div><div>Jami qiymat</div></div></div>
    <div class="section">
        <h2>➕ Mahsulot qo'shish</h2>
        <div class="form-group"><label>Rasm URL</label><input type="text" id="imgUrl" placeholder="https://picsum.photos/id/20/300/200"></div>
        <div class="form-group"><label>Nomi</label><input type="text" id="name" placeholder="Ko'ylak"></div>
        <div class="form-group"><label>Narx (so'm)</label><input type="number" id="price" placeholder="380000"></div>
        <div class="form-group"><label>Razmer</label><input type="text" id="size" placeholder="L"></div>
        <div class="form-group"><label>Yosh</label><input type="text" id="age" placeholder="7-10"></div>
        <button onclick="addProduct()">✅ Qo'shish</button>
    </div>
    <div class="section"><h2>📦 Mahsulotlar</h2><div id="productsTable"><div class="loading">⏳ Yuklanmoqda...</div></div></div>
</div>

<script>
let products = [
    {id:1, name:'Sport ko\'ylak', price:380000, size:'L', age:'7-10', image:'https://picsum.photos/id/20/300/200'},
    {id:2, name:'Krasovkalar', price:450000, size:'38', age:'10-12', image:'https://picsum.photos/id/21/300/200'},
    {id:3, name:'Soat', price:120000, size:'Universal', age:'8+', image:'https://picsum.photos/id/22/300/200'}
];

function displayProducts() {
    let container = document.getElementById('productsTable');
    if(products.length === 0) { container.innerHTML = '<div class="loading">📭 Mahsulot yo\'q</div>'; return; }
    let html = '能<thead> <th>Rasm</th><th>Nomi</th><th>Narx</th><th>Razmer</th><th>Yosh</th><th>Amallar</th> </thead><tbody>';
    for(let p of products) {
        html += `<tr><td><img class="product-img" src="${p.image}"></td><td><b>${p.name}</b></td><td style="color:#bf40ff;">${p.price.toLocaleString()} so'm</td><td>${p.size}</td><td>${p.age}</td><td><button class="edit-btn" onclick="editProduct(${p.id})">✏️</button><button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️</button></td></tr>`;
    }
    html += '</tbody>能';
    container.innerHTML = html;
    updateStats();
}

function updateStats() {
    document.getElementById('totalCount').innerText = products.length;
    let total = products.reduce((s,p) => s + p.price, 0);
    document.getElementById('totalSum').innerText = total.toLocaleString() + ' so\'m';
}

function addProduct() {
    let id = products.length + 1;
    let name = document.getElementById('name').value;
    let price = parseInt(document.getElementById('price').value);
    let size = document.getElementById('size').value;
    let age = document.getElementById('age').value;
    let img = document.getElementById('imgUrl').value;
    if(!name || !price) { alert('Nomi va narxni kiriting!'); return; }
    if(!img) img = 'https://picsum.photos/id/' + (Math.floor(Math.random()*100)+1) + '/300/200';
    products.push({id, name, price, size, age, image:img});
    alert('✅ Qo\'shildi!');
    document.getElementById('name').value = '';
    document.getElementById('price').value = '';
    document.getElementById('size').value = '';
    document.getElementById('age').value = '';
    document.getElementById('imgUrl').value = '';
    displayProducts();
}

function editProduct(id) {
    let p = products.find(p => p.id === id);
    if(!p) return;
    let newName = prompt('Yangi nom:', p.name);
    let newPrice = prompt('Yangi narx:', p.price);
    if(newName && newPrice) { p.name = newName; p.price = parseInt(newPrice); displayProducts(); alert('✅ Yangilandi!'); }
}

function deleteProduct(id) {
    if(confirm('O\'chirilsinmi?')) { products = products.filter(p => p.id !== id); displayProducts(); alert('✅ O\'chirildi!'); }
}

function logout() { window.location.href = '/'; }

displayProducts();
</script>
</body>
</html>
