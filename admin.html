<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | NEON MARKET</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#0a0a2a,#1a0033);color:#fff;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{background:rgba(191,64,255,0.2);padding:15px;border-radius:12px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;border:1px solid #bf40ff}
        .header h1{color:#bf40ff;font-size:22px}
        .logout-btn{background:#ff4040;color:#fff;border:none;padding:8px 20px;border-radius:25px;cursor:pointer}
        .section{background:rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-bottom:20px}
        .section h2{color:#bf40ff;margin-bottom:15px;border-bottom:1px solid #bf40ff;padding-bottom:8px}
        input,button{padding:10px;margin:5px;border-radius:8px;border:none;width:calc(100% - 10px)}
        button{background:#bf40ff;color:#fff;cursor:pointer;font-weight:bold}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid rgba(191,64,255,0.3)}
        th{color:#bf40ff}
        .product-img{width:50px;height:50px;object-fit:cover;border-radius:8px}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;margin-bottom:5px;color:#bf40ff}
        .edit-btn,.delete-btn{padding:5px 12px;margin:2px;border:none;border-radius:5px;cursor:pointer}
        .edit-btn{background:#ffa500;color:#fff}
        .delete-btn{background:#ff4040;color:#fff}
        .stats{display:flex;gap:15px;margin-bottom:20px}
        .stat-card{background:rgba(191,64,255,0.2);padding:15px;border-radius:12px;text-align:center;flex:1}
        .stat-number{font-size:28px;font-weight:bold;color:#bf40ff}
        .loading{text-align:center;padding:30px;color:#bf40ff}
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>👑 NEON MARKET | Admin Panel</h1><button class="logout-btn" onclick="logout()">🚪 Chiqish</button></div>
    
    <div class="stats"><div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>Mahsulotlar</div></div><div class="stat-card"><div class="stat-number" id="totalSum">0</div><div>Umumiy qiymat</div></div></div>
    
    <div class="section">
        <h2>➕ Mahsulot qo'shish</h2>
        <div class="form-group"><label>🖼 Rasm URL</label><input type="text" id="imgUrl" placeholder="https://picsum.photos/id/20/400/300"></div>
        <div class="form-group"><label>📦 Nomi</label><input type="text" id="name" placeholder="Ko'ylak"></div>
        <div class="form-group"><label>💰 Narx (so'm)</label><input type="number" id="price" placeholder="380000"></div>
        <div class="form-group"><label>📏 Razmer</label><input type="text" id="size" placeholder="L"></div>
        <div class="form-group"><label>🎂 Yosh</label><input type="text" id="age" placeholder="7-10"></div>
        <button onclick="addProduct()">✅ Mahsulot qo'shish</button>
    </div>
    
    <div class="section"><h2>📦 Barcha mahsulotlar</h2><div id="productsTable"><div class="loading">⏳ Yuklanmoqda...</div></div></div>
</div>

<script>
let products = [
    {id:1, name:'Sport ko\'ylak', price:380000, size:'L', age:'7-10', image:'https://picsum.photos/id/20/400/300'},
    {id:2, name:'Krasovkalar', price:450000, size:'38', age:'10-12', image:'https://picsum.photos/id/21/400/300'},
    {id:3, name:'Soat', price:120000, size:'Universal', age:'8+', image:'https://picsum.photos/id/22/400/300'},
    {id:4, name:'Shim', price:250000, size:'M', age:'8-10', image:'https://picsum.photos/id/23/400/300'},
    {id:5, name:'Futbolka', price:180000, size:'XL', age:'12-14', image:'https://picsum.photos/id/24/400/300'},
    {id:6, name:'Sumka', price:320000, size:'One', age:'10+', image:'https://picsum.photos/id/25/400/300'}
];

function displayProducts() {
    let container = document.getElementById('productsTable');
    if(products.length === 0) { container.innerHTML = '<div class="loading">📭 Mahsulot yo\'q</div>'; return; }
    let html = '能<thead><tr><th>Rasm</th><th>Nomi</th><th>Narx</th><th>Razmer</th><th>Yosh</th><th>Amallar</th></tr></thead><tbody>';
    for(let p of products) {
        html += `<tr><td><img class="product-img" src="${p.image}" onerror="this.src='https://picsum.photos/id/1/50/50'"></td><td><b>${p.name}</b></td><td style="color:#bf40ff;">${p.price.toLocaleString()} so'm</td><td>${p.size}</td><td>${p.age}</td><td><button class="edit-btn" onclick="editProduct(${p.id})">✏️</button> <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️</button></td></tr>`;
    }
    html += '</tbody>能';
    container.innerHTML = html;
    updateStats();
}

function updateStats() {
    document.getElementById('totalCount').innerText = products.length;
    let total = products.reduce((s,p) => s + p.price, 0);
    document.getElementById('totalSum').innerText = total.toLocaleString() + ' so\'m';
}

function addProduct() {
    let id = products.length + 1;
    let name = document.getElementById('name').value;
    let price = parseInt(document.getElementById('price').value);
    let size = document.getElementById('size').value;
    let age = document.getElementById('age').value;
    let img = document.getElementById('imgUrl').value;
    if(!name || !price) { alert('Nomi va narxni kiriting!'); return; }
    if(!img) img = 'https://picsum.photos/id/' + (Math.floor(Math.random()*100)+1) + '/400/300';
    products.push({id, name, price, size, age, image:img});
    alert('✅ Mahsulot qo\'shildi!');
    document.getElementById('name').value = '';
    document.getElementById('price').value = '';
    document.getElementById('size').value = '';
    document.getElementById('age').value = '';
    document.getElementById('imgUrl').value = '';
    displayProducts();
}

function editProduct(id) {
    let p = products.find(p => p.id === id);
    if(!p) return;
    let newName = prompt('Yangi nom:', p.name);
    let newPrice = prompt('Yangi narx:', p.price);
    if(newName && newPrice) { p.name = newName; p.price = parseInt(newPrice); displayProducts(); alert('✅ Yangilandi!'); }
}

function deleteProduct(id) {
    if(confirm('O\'chirilsinmi?')) { products = products.filter(p => p.id !== id); displayProducts(); alert('✅ O\'chirildi!'); }
}

function logout() { window.location.href = '/'; }

displayProducts();
</script>
</body>
</html>
