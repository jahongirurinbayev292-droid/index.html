<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pekin Tovar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --p: #8e44ad; --bg: #f3e5f5; --txt: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
        .header { background: var(--p); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; font-weight: bold; }
        
        /* 3 qatorli Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        .info { padding: 5px; text-align: center; }
        .info h4 { font-size: 11px; margin: 4px 0; height: 28px; overflow: hidden; }
        .price { color: var(--p); font-weight: bold; font-size: 12px; }

        /* Navigatsiya */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--p); }
        .nav-btn { border: none; background: none; color: var(--p); font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">PEKIN TOVAR 🌸</div>
    <div class="grid" id="products"></div>

    <div class="nav">
        <button class="nav-btn">🏠 Do'kon</button>
        <button class="nav-btn" onclick="showWishes()">💜 Istaklar</button>
        <button class="nav-btn">🛒 Savat</button>
        <button class="nav-btn" onclick="goAdmin()">⚙️ Sozlamalar</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        async function load() {
            const res = await fetch('products.json?v=' + Date.now());
            const data = await res.json();
            document.getElementById('products').innerHTML = data.map(p => `
                <div class="card" onclick="alert('Nomi: ${p.name}\\nNarxi: ${p.price}\\nRazmer: ${p.size}\\nYosh: ${p.age}')">
                    <img src="${p.image}">
                    <div class="info">
                        <h4>${p.name}</h4>
                        <div class="price">${Number(p.price).toLocaleString()} so'm</div>
                    </div>
                </div>
            `).join('');
        }

        function goAdmin() {
            if(prompt("Kodni kiriting:") === "4321") window.location.href = "admin.html";
        }
        window.onload = load;
    </script>
</body>
</html>
